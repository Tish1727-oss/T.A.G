{% extends "base.html" %}
{% block title %}AUREALBA | Login{% endblock %}

{% block splash %}<div id="splash">AUREALBA</div>{% endblock %}

{% block body %}
<div id="main-content">
  <header class="wc-header">
    <a href="{{ url_for('index') }}" class="wc-logo"><img src="{{ url_for('static', filename='images/aurealba_logo.png') }}" alt="AUREALBA" style="height:38px;object-fit:contain;"></a>
    <nav class="wc-nav">
      <ul>
        <li><a href="{{ url_for('catalog') }}">Catalog</a></li>
        <li><a href="{{ url_for('about') }}">About Us</a></li>
        <li><a href="{{ url_for('signup') }}">Sign Up</a></li>
      </ul>
    </nav>
  </header>

  <section class="signup-section">
    <h2>Welcome Back</h2>
    <form action="{{ url_for('login') }}" method="POST">
      <input type="email"    name="email"    placeholder="Email Address" required>
      <input type="password" name="password" placeholder="Password"      required>
      <button type="submit">Login</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:15px;">
      Don't have an account? <a href="{{ url_for('signup') }}" style="color:#D4AF37;">Sign Up</a>
    </p>
  </section>
</div>
{% endblock %}
