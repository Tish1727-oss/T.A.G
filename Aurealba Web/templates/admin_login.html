<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AUREALBA — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--gold:#C9A84C;--gold-pale:#FBF5E6;--bg:#F7F5F1;--surface:#fff;--text:#1C1812;--muted:#8A8070;--border:rgba(0,0,0,0.1);}
body{font-family:"DM Sans",sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:var(--surface);border-radius:24px;padding:48px 44px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,0.1);}
.brand{text-align:center;margin-bottom:36px;}
.brand .logo{font-family:"Cormorant Garamond",serif;font-size:40px;font-weight:700;color:var(--gold);letter-spacing:0.1em;}
.brand .sub{font-size:13px;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-top:4px;}
.brand h2{font-family:"Cormorant Garamond",serif;font-size:26px;margin-top:16px;color:var(--text);}
.field{margin-bottom:20px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;}
.field input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);font-size:15px;font-family:"DM Sans",sans-serif;color:var(--text);background:var(--bg);outline:none;transition:border-color .2s,box-shadow .2s;}
.field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.12);background:#fff;}
.btn{width:100%;padding:14px;background:var(--gold);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;font-family:"DM Sans",sans-serif;cursor:pointer;transition:all .2s;margin-top:8px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.4);}
.flash{padding:12px 16px;border-radius:10px;font-size:14px;margin-bottom:20px;background:#fde8ea;color:#9b2335;border-left:3px solid #9b2335;}
.back{text-align:center;margin-top:24px;font-size:14px;color:var(--muted);}
.back a{color:var(--gold);text-decoration:none;font-weight:500;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="logo">AUREALBA</div>
    <div class="sub">Admin Portal</div>
    <h2>Welcome back</h2>
  </div>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input type="text" name="username" placeholder="Admin username" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Admin password" required>
    </div>
    <button type="submit" class="btn">Sign In to Dashboard</button>
  </form>
  <div class="back"><a href="/">← Back to AUREALBA Website</a></div>
</div>
</body>
</html>
